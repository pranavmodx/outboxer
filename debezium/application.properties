debezium.sink.type=redis
debezium.sink.redis.address=redis:6379

debezium.source.offset.storage.file.filename=data/offsets.dat
debezium.source.offset.flush.interval.ms=0

debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.database.hostname=${DB_HOST}
debezium.source.database.port=${DB_PORT}
debezium.source.database.user=${DB_USER}
debezium.source.database.password=${DB_PASSWORD}
debezium.source.database.dbname=${DB_NAME}
debezium.source.database.server.name=${DB_SERVER_NAME}
debezium.source.topic.prefix=${DB_SERVER_NAME}
debezium.source.table.include.list=public.outbox_events
debezium.source.plugin.name=pgoutput
debezium.source.slot.name=outbox_slot_redis
debezium.source.publication.name=outbox_pub_redis

debezium.transforms=outbox
debezium.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter
debezium.transforms.outbox.table.fields.additional.placement=aggregate_type:header,event_type:header
debezium.transforms.outbox.table.field.event.id=id
debezium.transforms.outbox.table.field.event.key=id
debezium.transforms.outbox.table.field.event.payload=payload
debezium.transforms.outbox.route.by.field=event_type
debezium.transforms.outbox.route.topic.replacement=$${routedByValue}

# Debezium Server format configuration
# Natively redis stream entries will be key: value pairs where value is this JSON
debezium.sink.redis.message.format=extended
debezium.format.value=json
debezium.format.key=json
debezium.format.value.schemas.enable=false
debezium.format.key.schemas.enable=false
